<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <img src="img/cw_logo-horizontal.png" alt="charity: water logo" class="brand-logo">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <button id="start-btn">Start Game</button>
            <div class="difficulty-panel" role="tablist" aria-label="Difficulty">
                <button class="difficulty-btn" data-mode="Easy">Easy</button>
                <button class="difficulty-btn active" data-mode="Normal">Normal</button>
                <button class="difficulty-btn" data-mode="Hard">Hard</button>
            </div>
        </div>
        <div id="message" class="game-message"></div>
        
        <div id="game-container">
        </div>
    </div>
        
        <footer class="site-footer">
            <div class="footer-left">
                <img src="img/cw_logo.png" alt="charity: water logo" class="footer-logo">
                <div class="footer-text">Learn more or support charity: water</div>
            </div>
            <div class="footer-links">
                <a href="https://www.charitywater.org/about" target="_blank" rel="noopener">About Us</a>
                <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener" class="donate-link">Donate</a>
            </div>
        </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fontfaceobserver/2.1.0/fontfaceobserver.standalone.js"></script>
    <script>
        document.documentElement.classList.add('font-loading');
        if (window.FontFaceObserver) {
            const proxima = new FontFaceObserver('Proxima Nova');
            proxima.load(null, 5000).then(function() {
                document.documentElement.classList.remove('font-loading');
                document.documentElement.classList.add('font-loaded');
            }).catch(function() {
                document.documentElement.classList.remove('font-loading');
                document.documentElement.classList.add('font-failed');
            });
        } else {
            document.documentElement.classList.remove('font-loading');
        }
    </script>

    <script src="script.js"></script>
</body>
</html>
